<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Noir - Production</title>
    <!-- ПОДКЛЮЧЕНИЕ КОНФИГА (Убедитесь, что файл лежит рядом) -->
    <script src="config.js"></script>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #111111;
            --text: #ffffff;
            --accent-green: #2ecc71;
            --accent-blue: #3498db;
            --accent-red: #e74c3c;
            --border: #222222;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: "Courier New", Courier, monospace; /* Более архивный стиль */
            margin: 0;
            padding: 10px;
            user-select: none;
        }

        #catalog {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 100px;
        }

        .c-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 10px;
            position: relative;
        }

        .i-name { font-size: 13px; margin-bottom: 5px; text-transform: uppercase; }
        .i-price { color: var(--accent-green); font-size: 15px; font-weight: bold; }
        .i-stock { font-size: 10px; opacity: 0.5; margin-top: 5px; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .settings-box {
            background: #000;
            width: 85%;
            max-width: 320px;
            padding: 20px;
            border: 1px solid #444;
            text-align: center;
        }

        .s-btn {
            width: 100%;
            padding: 14px;
            margin-bottom: 10px;
            border: 1px solid;
            background: transparent;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-green { border-color: var(--accent-green); color: var(--accent-green); }
        .btn-blue  { border-color: var(--accent-blue); color: var(--accent-blue); }
        .btn-grey  { border-color: #666; color: #666; }
        .btn-red   { border-color: var(--accent-red); color: var(--accent-red); background: #200; }

        #item-preview {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            margin-bottom: 15px;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <div id="catalog"></div>

    <div id="item-menu-modal" class="modal-overlay" onclick="closeItemMenu()">
        <div class="settings-box" onclick="event.stopPropagation()">
            <div id="menu-item-name" style="margin-bottom: 15px;">ITEM</div>
            
            <div id="view-photo-container" style="display: none;">
                <img id="item-preview" src="">
            </div>

            <button id="btn-add-cart" class="s-btn btn-green" onclick="confirmAddFromMenu()">В КОРЗИНУ</button>
            <button id="btn-save-db" class="s-btn btn-blue" onclick="confirmUpload()" style="display: none;">СОХРАНИТЬ В БАЗУ</button>
            <button id="btn-take-photo" class="s-btn btn-grey" onclick="triggerCamera()">СДЕЛАТЬ ФОТО</button>
            <button id="btn-retake-photo" class="s-btn btn-grey" onclick="triggerCamera()" style="display: none;">ПЕРЕСНЯТЬ</button>
            <button id="btn-cancel" class="s-btn btn-red" onclick="handleCancel()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <input type="file" id="camera-input" accept="image/*" capture="environment" style="display: none;" onchange="handlePhoto(event)">
    <canvas id="resize-canvas" style="display: none;"></canvas>

    <script>
        let db = [];
        let selectedItemId = null;
        let tempBase64 = null;

        async function load() {
            try {
                // APPS_SCRIPT_URL берется напрямую из config.js
                const res = await fetch(APPS_SCRIPT_URL);
                const data = await res.json();
                db = data.items || data;
                render();
            } catch (e) { 
                alert("Ошибка: Ссылка в config.js неверна или недоступна");
            }
        }

        function render() {
            const container = document.getElementById('catalog');
            container.innerHTML = db.map(i => {
                const hasPhoto = i.img && i.img.length > 10;
                const photoIcon = hasPhoto ? '● ' : '';
                return `
                    <div class="c-item" onclick="openItemMenu('${i.id}')">
                        <div class="i-name">${photoIcon}${i.name}</div>
                        <div class="i-price">${i.price} ₸</div>
                        <div class="i-stock">STK: ${i.stock || 0}</div>
                    </div>
                `;
            }).join('');
        }

        function openItemMenu(id) {
            selectedItemId = id;
            tempBase64 = null;
            const item = db.find(x => x.id === id);
            document.getElementById('menu-item-name').innerText = item.name;
            
            showElement('btn-add-cart', true);
            showElement('btn-save-db', false);
            
            if (item.img && item.img.length > 10) {
                showElement('view-photo-container', true);
                document.getElementById('item-preview').src = item.img;
                showElement('btn-take-photo', false);
                showElement('btn-retake-photo', true);
            } else {
                showElement('view-photo-container', false);
                showElement('btn-take-photo', true);
                showElement('btn-retake-photo', false);
            }
            document.getElementById('btn-cancel').innerText = "ЗАКРЫТЬ";
            document.getElementById('item-menu-modal').style.display = 'flex';
        }

        function handleCancel() {
            if (tempBase64) { openItemMenu(selectedItemId); } 
            else { closeItemMenu(); }
        }

        function closeItemMenu() { document.getElementById('item-menu-modal').style.display = 'none'; }
        function triggerCamera() { document.getElementById('camera-input').click(); }

        function handlePhoto(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('resize-canvas');
                    const ctx = canvas.getContext('2d');
                    const MAX_W = 800;
                    let w = img.width, h = img.height;
                    if (w > MAX_W) { h *= MAX_W/w; w = MAX_W; }
                    canvas.width = w; canvas.height = h;
                    ctx.drawImage(img, 0, 0, w, h);
                    tempBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    
                    document.getElementById('item-preview').src = tempBase64;
                    showElement('view-photo-container', true);
                    showElement('btn-add-cart', false);
                    showElement('btn-save-db', true);
                    showElement('btn-take-photo', false);
                    showElement('btn-retake-photo', true);
                    document.getElementById('btn-cancel').innerText = "ОТМЕНА";
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function confirmUpload() {
            const btn = document.getElementById('btn-save-db');
            btn.innerText = "SAVE...";
            try {
                const res = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'upload_photo', item_id: selectedItemId, base64: tempBase64 })
                });
                location.reload();
            } catch (e) { alert("Ошибка сохранения"); }
        }

        function confirmAddFromMenu() {
            if (typeof add === "function") { add(selectedItemId); }
            closeItemMenu();
        }

        function showElement(id, isShow) { document.getElementById(id).style.display = isShow ? 'block' : 'none'; }
        
        load();
    </script>
</body>
</html>
