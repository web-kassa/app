<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>POS Noir V5.3.0</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Courier New", Courier, monospace; }
        
        body { 
            background: #0a0a0a; color: #fff; 
            height: 100dvh; 
            display: flex; flex-direction: column; overflow: hidden; transition: background-color 0.3s; 
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        .header-area { flex-shrink: 0; border-bottom: 1px solid #222; }
        .modes { display: flex; padding: 4px; gap: 4px; }
        .m-btn { flex: 1; padding: 12px; border: 1px solid #333; background: #111; color: #444; font-weight: 900; border-radius: 4px; font-size: 13px; text-transform: uppercase; transition: 0.2s; }
        .m-btn.active-s { background: #1a3a20; color: #2ecc71; border-color: #2ecc71; }
        .m-btn.active-r { background: #3a1a1a; color: #e74c3c; border-color: #e74c3c; }

        .search-area { padding: 0 4px 4px; }
        .s-input { width: 100%; background: #141414; color: #fff; border: 1px solid #333; border-radius: 4px; padding: 10px; font-size: 14px; outline: none; }

        .list-header { display: flex; align-items: center; gap: 8px; padding: 4px 14px; font-size: 10px; color: #666; font-weight: bold; border-bottom: 1px solid #222; }
        @media (pointer: fine) { .list-header { padding-right: 20px; } }

        #catalog { 
            flex-grow: 1; 
            min-height: 0; 
            overflow-y: auto; 
            padding: 4px; 
            border-bottom: 1px solid #222; 
        }
        
        .c-item { background: #141414; border: 1px solid #222; border-radius: 4px; padding: 8px 10px; margin-bottom: 3px; display: flex; align-items: center; gap: 8px; }
        .i-name { flex-grow: 1; font-size: 12px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .i-price { width: 85px; font-size: 13px; font-weight: bold; text-align: right; color: #fff; }
        .i-stock { width: 45px; font-size: 14px; font-weight: bold; text-align: center; color: #00ffff; background: #003333; border: 1px solid #008888; border-radius: 3px; padding: 2px 0; }

        .cart-sec { flex-shrink: 0; background: rgba(0,0,0,0.5); border-top: 2px solid #2ecc71; display: flex; flex-direction: column; max-height: 40dvh; }
        .cart-sec.r-theme { border-top-color: #e74c3c; }
        #cart-list { overflow-y: auto; padding: 4px; padding-bottom: 15px; } 
        
        .cart-row { background: #111; padding: 6px; border-radius: 4px; margin-bottom: 3px; border: 1px solid #222; }
        .row-top { font-size: 11px; font-weight: bold; color: #888; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .row-ctrl { display: flex; justify-content: space-between; align-items: center; }
        
        .qty-box { display: flex; align-items: center; background: #000; border: 1px solid #333; border-radius: 4px; }
        .q-btn { background: #1a1a1a; color: #f1c40f; width: 38px; height: 38px; border: none; font-size: 20px; cursor: pointer; }
        .q-val { width: 80px; height: 38px; text-align: center; font-size: 16px; font-weight: bold; background: transparent; border: none; color: #fff; outline: none; border-left: 1px solid #333; border-right: 1px solid #333; }
        .p-input { width: 85px; height: 38px; background: #000; color: #f1c40f; border: 1px solid #333; text-align: right; padding: 8px; border-radius: 4px; font-size: 15px; font-weight: bold; outline: none; }
        
        .footer { flex-shrink: 0; padding: 6px 4px; border-top: 1px solid #222; }
        .total-box { display: flex; justify-content: space-between; font-size: 18px; font-weight: 900; margin-bottom: 6px; padding: 0 4px; }
        
        .btns { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .pay { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 50px; border: none; border-radius: 4px; color: #fff; cursor: pointer; padding: 2px; }
        .pay-title { font-weight: bold; font-size: 8px; text-transform: uppercase; margin-bottom: 2px; }
        .pay-sum { font-size: 9px; font-weight: 900; opacity: 0.9; white-space: nowrap; }
        
        .p-cash { background: #27ae60; }
        .p-qr { background: #c0392b; }
        .p-red { background: #8e44ad; } 
        .p-card { background: #2980b9; }
        .p-trans { background: #f39c12; color: #000 !important; }
        .p-trans .pay-sum { color: #000; }

        .modal-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .receipt-box { width: 100%; max-width: 400px; border: 2px dashed #444; background: #111; padding: 20px; border-radius: 8px; }
        .r-title { text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .r-method { text-align: center; font-size: 12px; color: #f1c40f; margin-bottom: 15px; text-transform: uppercase; }
        .r-item { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; border-bottom: 1px dotted #333; padding-bottom: 2px; }
        .r-total { text-align: right; font-size: 18px; font-weight: bold; margin-top: 15px; border-top: 1px solid #444; padding-top: 10px; }
        
        .modal-btns { display: flex; gap: 10px; margin-top: 25px; }
        .cancel-btn { flex: 1; padding: 15px; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        .confirm-btn { flex: 2; padding: 15px; background: #2ecc71; color: #000; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 14px; }

        /* СТИЛИ БЛОКОВ ОТЧЕТА */
        .hist-block { background: #141414; border: 1px solid #333; border-left-width: 4px; border-radius: 4px; padding: 10px; margin-bottom: 8px; }
        .hb-head { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 6px; font-weight: bold; border-bottom: 1px dashed #333; padding-bottom: 6px; text-transform: uppercase; }
        .hb-item { display: flex; justify-content: space-between; font-size: 11px; color: #aaa; margin-bottom: 4px; }
        .hb-type-r { text-decoration: line-through; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="header-area">
        <div class="modes">
            <button id="ms" class="m-btn active-s" onclick="sm('sale')">ПРОДАЖА</button>
            <button id="mr" class="m-btn" onclick="sm('return')">ВОЗВРАТ</button>
            <button class="m-btn" style="flex: 0.2; background: #111; color: #888; padding: 12px 0; border-color: #333;" onclick="openReport()">📊</button>
        </div>
        
        <div class="search-area" style="display: flex; gap: 10px;">
            <input type="text" id="sb" class="s-input" placeholder="ПОИСК..." onkeyup="filter()" style="flex-grow: 1; margin: 0;">
            <button id="btn-install" style="display: none; padding: 0 15px; background: #1a3a20; color: #2ecc71; border: 1px solid #2ecc71; border-radius: 4px; cursor: pointer; white-space: nowrap; font-family: inherit;">
                💾 На ПК
            </button>
            <button id="btn-update" onclick="forceAppUpdate();" style="padding: 0 15px; background: #222; color: #eee; border: 1px solid #555; border-radius: 4px; cursor: pointer; white-space: nowrap; font-family: inherit;">
                🔄 Обновить
            </button>
        </div>
        
        <div class="list-header">
            <div style="flex-grow: 1; display: flex; align-items: center; gap: 10px;">
                <span>НАИМЕНОВАНИЕ</span>
                <span id="app-version" style="font-size: 9px; color: #888; font-family: monospace; background: #1a1a1a; padding: 2px 6px; border-radius: 6px; border: 1px solid #333; text-transform: lowercase;">v: --</span>
            </div>
            <div style="width: 85px; text-align: right;">ЦЕНА</div>
            <div style="width: 45px; text-align: center;">ОСТ</div>
        </div>
    </div>

    <div id="catalog"></div>

    <div id="cs" class="cart-sec">
        <div id="cart-list"></div>
        <div class="footer">
            <div class="total-box">
                <span id="tl">ИТОГО:</span>
                <span id="ta">0 ₸</span>
            </div>
            <div class="btns">
                <button class="pay p-cash" onclick="initPay('cash', 'Наличные')"><span class="pay-title">Нал</span><span class="pay-sum" id="sum-cash">0 ₸</span></button>
                <button class="pay p-qr" onclick="initPay('qr_kaspi', 'Kaspi QR')"><span class="pay-title">QR</span><span class="pay-sum" id="sum-qr">0 ₸</span></button>
                <button class="pay p-red" onclick="initPay('installment', 'Kaspi Red')"><span class="pay-title">Red</span><span class="pay-sum" id="sum-red">0 ₸</span></button>
                <button class="pay p-card" onclick="initPay('pos_terminal', 'Карта')"><span class="pay-title">Карт</span><span class="pay-sum" id="sum-card">0 ₸</span></button>
                <button class="pay p-trans" onclick="initPay('transfer', 'Перевод')"><span class="pay-title">Пер</span><span class="pay-sum" id="sum-trans">0 ₸</span></button>
            </div>
        </div>
    </div>

    <!-- ОКНО ЧЕКА -->
    <div id="receipt-modal" class="modal-overlay">
        <div class="receipt-box">
            <div id="r-title" class="r-title">ПОДТВЕРЖДЕНИЕ</div>
            <div id="r-method" class="r-method">Метод оплаты</div>
            <div id="r-items-list"></div>
            <div id="r-total" class="r-total">ИТОГО: 0 ₸</div>
            
            <div class="modal-btns">
                <button class="cancel-btn" onclick="cancelTx()">ОТМЕНА</button>
                <button id="btn-confirm" class="confirm-btn" onclick="confirmTx()">ПОДТВЕРДИТЬ</button>
            </div>
        </div>
    </div>

    <!-- ОКНО Z-ОТЧЕТА С КАЛЕНДАРЕМ -->
    <div id="report-modal" class="modal-overlay">
        <div class="receipt-box" style="max-height: 85vh; display: flex; flex-direction: column; width: 100%; max-width: 400px; padding: 15px; border-color: #555;">
            
            <!-- Умная шапка -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 10px;">
                <div id="rep-header-title" style="font-size: 14px; font-weight: bold; color: #fff;">ОТЧЕТ ЗА СЕГОДНЯ</div>
                <input type="date" id="rep-date" style="background: #222; color: #fff; border: 1px solid #444; padding: 5px; border-radius: 4px; color-scheme: dark; font-family: inherit; outline: none; font-size: 11px; cursor: pointer;" oninput="renderReport()" onchange="renderReport()">
            </div>
            
            <div id="rep-list" style="flex-grow: 1; overflow-y: auto; padding-right: 5px;"></div>
            <div id="rep-totals" style="margin-top: 15px; border-top: 2px solid #444; padding-top: 10px;"></div>
            
            <!-- Оставили только кнопку ЗАКРЫТЬ -->
            <div class="modal-btns" style="margin-top: 15px;">
                <button class="cancel-btn" style="width: 100%;" onclick="closeReport()">ЗАКРЫТЬ ОТЧЕТ</button>
            </div>
        </div>
    </div>

    <script src="config.js?v=5.3.0"></script>
    <script>
        let db = [], cart = [], mode = 'sale', pendingMethod = null;

        function sm(m) {
            mode = m;
            document.getElementById('ms').classList.toggle('active-s', m==='sale');
            document.getElementById('mr').classList.toggle('active-r', m==='return');
            document.getElementById('cs').classList.toggle('r-theme', m==='return');
            document.getElementById('tl').innerText = m==='return'?'К ВОЗВРАТУ:':'ИТОГО:';
            document.body.style.backgroundColor = m === 'return' ? '#2c0b0b' : '#0a0a0a';
        }

        async function load() {
            try {
                const cachedDb = localStorage.getItem('db_cache');
                const cachedTotals = localStorage.getItem('totals_cache');
                if (cachedDb) db = JSON.parse(cachedDb);
                if (cachedTotals) {
                    const t = JSON.parse(cachedTotals);
                    document.getElementById('sum-cash').innerText = (t.cash || 0).toLocaleString() + ' ₸';
                    document.getElementById('sum-qr').innerText = (t.qr_kaspi || t.qr || 0).toLocaleString() + ' ₸';
                    document.getElementById('sum-red').innerText = (t.installment || 0).toLocaleString() + ' ₸';
                    document.getElementById('sum-card').innerText = (t.pos_terminal || t.card || 0).toLocaleString() + ' ₸';
                    document.getElementById('sum-trans').innerText = (t.transfer || 0).toLocaleString() + ' ₸';
                }
                if (db && db.length > 0) render();
            } catch (e) { }

            if (!navigator.onLine) return; 

            try {
                const res = await fetch(APPS_SCRIPT_URL + "?t=" + Date.now());
                const data = await res.json();
                
                db = data.items || [];
                const t = data.totals || { cash: 0, qr_kaspi: 0, pos_terminal: 0, transfer: 0, installment: 0 };
                
                document.getElementById('sum-cash').innerText = t.cash.toLocaleString() + ' ₸';
                document.getElementById('sum-qr').innerText = t.qr_kaspi.toLocaleString() + ' ₸';
                document.getElementById('sum-red').innerText = t.installment.toLocaleString() + ' ₸';
                document.getElementById('sum-card').innerText = t.pos_terminal.toLocaleString() + ' ₸';
                document.getElementById('sum-trans').innerText = t.transfer.toLocaleString() + ' ₸';
                
                render();

                localStorage.setItem('db_cache', JSON.stringify(db));
                localStorage.setItem('totals_cache', JSON.stringify(t));
            } catch (e) { }
        }

        function render() {
            document.getElementById('catalog').innerHTML = db.map(i => `
                <div class="c-item" onclick="add('${i.id}')">
                    <div class="i-name">${i.name}</div>
                    <div class="i-price">${i.price.toLocaleString()} ₸</div>
                    <div class="i-stock">${i.stock||0}</div>
                </div>
            `).join('');
        }

        function filter() {
            let q = document.getElementById('sb').value.toLowerCase();
            document.querySelectorAll('.c-item').forEach(el => {
                const name = el.querySelector('.i-name').innerText.toLowerCase();
                el.style.display = name.includes(q) ? 'flex' : 'none';
            });
        }

        function add(id) {
            const p = db.find(x => x.id === id);
            const inC = cart.find(x => x.id === id);
            if (inC) inC.qty++;
            else cart.push({id:p.id, name:p.name, qty:1, price:p.price, cost:p.cost});
            update();
        }

        function handleFocus(elem, rowId) {
            elem.select(); 
            setTimeout(() => { 
                const row = document.getElementById(rowId);
                if (row) row.scrollIntoView({behavior: "smooth", block: "center"}); 
            }, 350);
        }

        function update() {
            const list = document.getElementById('cart-list');
            list.innerHTML = cart.map((item, idx) => `
                <div class="cart-row" id="r-${item.id}">
                    <div class="row-top">${item.name}</div>
                    <div class="row-ctrl">
                        <div class="qty-box">
                            <button class="q-btn" onclick="qty('${item.id}',-1)">-</button>
                            <input type="text" inputmode="numeric" class="q-val" value="${item.qty}" 
                                   onfocus="handleFocus(this, 'r-${item.id}')" oninput="cart[${idx}].qty=parseInt(this.value)||0; total()">
                            <button class="q-btn" onclick="qty('${item.id}',1)">+</button>
                        </div>
                        <input type="text" inputmode="numeric" class="p-input" value="${item.price}" 
                               onfocus="handleFocus(this, 'r-${item.id}')" oninput="cart[${idx}].price=parseFloat(this.value)||0; total()">
                        <div onclick="rm('${item.id}')" style="color:#e74c3c;padding:3px;font-size:18px;">✕</div>
                    </div>
                </div>
            `).join('');
            total();
        }

        function qty(id, d) {
            const i = cart.find(x => x.id === id);
            if(i) { i.qty += d; if(i.qty <= 0) rm(id); else update(); }
        }

        function rm(id) { cart = cart.filter(x => x.id !== id); update(); }

        function total() {
            const s = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            document.getElementById('ta').innerText = s.toLocaleString() + ' ₸';
        }

        function initPay(methodCode, methodName) {
            if (!cart.length) return;
            pendingMethod = methodCode; 

            const colors = { 'cash': '#27ae60', 'qr_kaspi': '#c0392b', 'installment': '#8e44ad', 'pos_terminal': '#2980b9', 'transfer': '#f39c12' };
            const activeColor = colors[methodCode] || '#2ecc71';

            document.querySelector('.receipt-box').style.borderColor = activeColor;
            document.getElementById('r-method').style.color = activeColor;
            
            const btnConfirm = document.getElementById('btn-confirm');
            btnConfirm.style.background = activeColor;
            btnConfirm.style.color = methodCode === 'transfer' ? '#000' : '#fff';

            document.getElementById('r-title').innerText = mode === 'sale' ? "ПОДТВЕРДИТЬ ПРОДАЖУ" : "ПОДТВЕРДИТЬ ВОЗВРАТ";
            document.getElementById('r-method').innerText = "Оплата: " + methodName;
            document.getElementById('r-items-list').innerHTML = cart.map(c => `
                <div class="r-item"><span>${c.name}</span><b>${c.qty} x ${c.price.toLocaleString()}</b></div>
            `).join('');
            document.getElementById('r-total').innerText = "ИТОГО: " + cart.reduce((a, b) => a + (b.price * b.qty), 0).toLocaleString() + " ₸";
            
            document.getElementById('receipt-modal').style.display = 'flex';
        }

        function cancelTx() { document.getElementById('receipt-modal').style.display = 'none'; }

        async function confirmTx() {
            const btn = document.getElementById('btn-confirm');
            btn.disabled = true;
            const tid = (mode === 'sale' ? 'SL-' : 'RT-') + Math.random().toString(36).substring(7).toUpperCase();
            const now = new Date();
            const localTime = now.toLocaleDateString('ru-RU') + ' ' + now.toLocaleTimeString('ru-RU');

            const p = {
                tx_id: tid, tx_type: mode, payment_method: pendingMethod, source: "pos_v5.3.0",
                created_at: localTime,
                cart: cart.map(c => ({item_id:c.id, item_name:c.name, qty:c.qty, price:c.price, cost_price:c.cost}))
            };

            try {
                // Очередь для отправки на сервер остается! (Это наш Offline-First режим)
                let queue = JSON.parse(localStorage.getItem('txQueue') || '[]');
                queue.push(p);
                localStorage.setItem('txQueue', JSON.stringify(queue));

                const cartTotal = cart.reduce((sum, item) => sum + (item.qty * item.price), 0);
                
                // ВНИМАНИЕ: Блок сохранения отчета в localStorage.getItem('daily_history') ПОЛНОСТЬЮ УДАЛЕН.
                // Касса больше не хранит локальную историю чеков.

                const methodMap = { 'cash': 'sum-cash', 'qr_kaspi': 'sum-qr', 'qr': 'sum-qr', 'installment': 'sum-red', 'pos_terminal': 'sum-card', 'card': 'sum-card', 'transfer': 'sum-trans' };
                const targetId = methodMap[pendingMethod];
                
                if (targetId) {
                    const el = document.getElementById(targetId);
                    if (el) {
                        let currentSum = parseInt(el.innerText.replace(/[^\d-]/g, '')) || 0;
                        currentSum = (mode === 'sale') ? currentSum + cartTotal : currentSum - cartTotal;
                        el.innerText = currentSum.toLocaleString('ru-RU') + ' ₸';
                    }
                }

                document.getElementById('receipt-modal').style.display = 'none';
                cart = []; 
                update(); 
                sm('sale'); 

                const searchInput = document.getElementById('sb');
                searchInput.value = ''; 
                searchInput.blur(); 
                filter(); 

            } catch (e) { alert("ОШИБКА СОХРАНЕНИЯ В ПАМЯТЬ: " + e.message); } 
            finally { btn.disabled = false; }
        }

        let isSyncing = false; 
        async function syncQueue() {
            if (isSyncing || !navigator.onLine) return; 
            let queue = JSON.parse(localStorage.getItem('txQueue') || '[]');
            if (queue.length === 0) return; 

            isSyncing = true;
            try {
                const response = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(queue[0]) });
                const result = await response.json();
                if (result.success) {
                    queue.shift(); 
                    localStorage.setItem('txQueue', JSON.stringify(queue));
                }
            } catch (e) { } 
            finally { isSyncing = false; }
        }
        setInterval(syncQueue, 5000);
        window.addEventListener('online', syncQueue);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
        }

        function displayAppVersion() {
            if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
                const messageChannel = new MessageChannel();
                messageChannel.port1.onmessage = function(event) {
                    if (event.data && event.data.version) document.getElementById('app-version').innerText = "v: " + event.data.version;
                };
                navigator.serviceWorker.controller.postMessage({ type: 'GET_VERSION' }, [messageChannel.port2]);
            } else {
                document.getElementById('app-version').innerText = "v: dev";
            }
        }
        window.addEventListener('load', displayAppVersion);

        let isUpdatePending = false;
        setInterval(() => {
            if (isUpdatePending && typeof cart !== 'undefined' && cart.length === 0) window.location.reload(true);
        }, 2000);

        setInterval(async () => {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(regs => { for(let reg of regs) reg.update(); });
            }
            if (navigator.onLine) {
                try {
                    const res = await fetch(APPS_SCRIPT_URL + "?t=" + Date.now());
                    const data = await res.json();
                    db = data.items || [];
                    const t = data.totals || { cash: 0, qr_kaspi: 0, pos_terminal: 0, transfer: 0, installment: 0 };
                    localStorage.setItem('db_cache', JSON.stringify(db));
                    localStorage.setItem('totals_cache', JSON.stringify(t));

                    document.getElementById('sum-cash').innerText = t.cash.toLocaleString() + ' ₸';
                    document.getElementById('sum-qr').innerText = t.qr_kaspi.toLocaleString() + ' ₸';
                    document.getElementById('sum-red').innerText = t.installment.toLocaleString() + ' ₸';
                    document.getElementById('sum-card').innerText = t.pos_terminal.toLocaleString() + ' ₸';
                    document.getElementById('sum-trans').innerText = t.transfer.toLocaleString() + ' ₸';
                    
                    if (typeof cart !== 'undefined' && cart.length === 0) render(); 
                    else isUpdatePending = true; 
                } catch(e) { }
            }
        }, 15 * 60 * 1000);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                displayAppVersion();
                if (typeof cart !== 'undefined' && cart.length === 0) window.location.reload(true); 
                else isUpdatePending = true; 
            });
        }

        function forceAppUpdate() {
            const btn = document.getElementById('btn-update');
            if (btn) { btn.innerText = '⏳ Качаю...'; btn.style.background = '#444'; btn.disabled = true; }
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(regs => {
                    if(regs.length === 0) { window.location.reload(true); return; }
                    let promises = [];
                    for(let reg of regs) { promises.push(reg.update()); }
                    Promise.all(promises).then(() => { setTimeout(() => { window.location.reload(true); }, 1000); })
                    .catch(() => { window.location.reload(true); });
                });
            } else { window.location.reload(true); }
        }

        let deferredPrompt;
        const installBtn = document.getElementById('btn-install');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (installBtn) installBtn.style.display = 'block'; 
        });

        if (installBtn) {
            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') installBtn.style.display = 'none';
                    deferredPrompt = null;
                }
            });
        }

        // --- ЛОГИКА СЕРВЕРНОГО Z-ОТЧЕТА ---
        function openReport() {
            document.getElementById('report-modal').style.display = 'flex';
            
            const now = new Date();
            const today = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
            
            const dateInput = document.getElementById('rep-date');
            if (!dateInput.value) dateInput.value = today;
            
            renderReport();
        }

        async function renderReport() {
            const selectedDate = document.getElementById('rep-date').value;
            const titleEl = document.getElementById('rep-header-title');
            const repList = document.getElementById('rep-list');
            const totalsBox = document.getElementById('rep-totals');
            
            // Формируем заголовок
            const now = new Date();
            const today = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
            if (selectedDate === today) {
                titleEl.innerText = "ОТЧЕТ ЗА СЕГОДНЯ";
            } else {
                const dParts = selectedDate.split('-'); 
                titleEl.innerText = `ОТЧЕТ ЗА ${dParts[2]}.${dParts[1]}.${dParts[0]}`;
            }

            // Показываем загрузку
            repList.innerHTML = '<div style="text-align:center; color:#f39c12; margin-top:30px; font-size: 12px; font-weight: bold;">⏳ СКАЧИВАЮ ДАННЫЕ ИЗ БАЗЫ...</div>';
            totalsBox.innerHTML = '';

            if (!navigator.onLine) {
                repList.innerHTML = '<div style="text-align:center; color:#e74c3c; margin-top:30px; font-size: 12px;">НЕТ ИНТЕРНЕТА ДЛЯ ЗАГРУЗКИ ОТЧЕТА</div>';
                return;
            }

            try {
                // 1. Добавили "&t=" + Date.now() чтобы браузер не подсовывал старый кэшированный ответ
                const response = await fetch(APPS_SCRIPT_URL + "?action=report&date=" + selectedDate + "&t=" + Date.now());
                const data = await response.json();
                
                // 2. ДИАГНОСТИКА: Если Google-скрипт упал с ошибкой
                if (data.error) {
                    repList.innerHTML = `<div style="text-align:center; color:#e74c3c; margin-top:30px; font-size: 11px;"><b>ОШИБКА В GOOGLE SCRIPT:</b><br>${data.error}</div>`;
                    return;
                }

                // 3. ДИАГНОСТИКА: Если скрипт работает по старой версии (вернул товары вместо отчета)
                if (!data.report) {
                    repList.innerHTML = `<div style="text-align:center; color:#f39c12; margin-top:30px; font-size: 11px;"><b>СВЯЗЬ ИДЕТ СО СТАРОЙ ВЕРСИЕЙ СЕРВЕРА</b><br>Проверьте, не изменился ли APPS_SCRIPT_URL при публикации новой версии.</div>`;
                    return;
                }
                
                if (data.report.length === 0) {
                    repList.innerHTML = '<div style="text-align:center; color:#666; margin-top:30px; font-size: 12px;">ЗА ЭТУ ДАТУ ОПЕРАЦИЙ НЕТ</div>';
                    return;
                }

                const colors = { 'cash': '#27ae60', 'qr_kaspi': '#c0392b', 'installment': '#8e44ad', 'pos_terminal': '#2980b9', 'transfer': '#f39c12' };
                const names = { 'cash': 'Наличные', 'qr_kaspi': 'Kaspi QR', 'installment': 'Kaspi Red', 'pos_terminal': 'Карта', 'transfer': 'Перевод' };
                let totals = { sale: 0, return: 0 };
                
                // Отрисовываем полученные с сервера чеки
                repList.innerHTML = data.report.map(h => {
                    let isRet = h.type === 'return';
                    if (isRet) totals.return += h.total; else totals.sale += h.total;
                    
                    let itemsHtml = h.cart.map(c => 
                        `<div class="hb-item"><span>${c.name} (${c.qty} шт)</span><span>${(c.qty*c.price).toLocaleString()} ₸</span></div>`
                    ).join('');
                    
                    let blockColor = colors[h.methodCode] || '#2ecc71';
                    let methodName = names[h.methodCode] || h.methodCode;

                    return `
                    <div class="hist-block" style="border-left-color: ${blockColor};">
                        <div class="hb-head" style="color: ${blockColor};">
                            <span>${h.time} | ${isRet ? 'ВОЗВРАТ' : 'ПРОДАЖА'} | ${methodName}</span>
                            <span>${isRet ? '-' : ''}${h.total.toLocaleString()} ₸</span>
                        </div>
                        <div class="hb-items ${isRet ? 'hb-type-r' : ''}">${itemsHtml}</div>
                    </div>`;
                }).join('');
                
                totalsBox.innerHTML = `
                    <div style="display:flex; justify-content:space-between; color:#2ecc71; font-size: 12px; margin-bottom: 4px;"><span>ПРОДАЖИ:</span><span>${totals.sale.toLocaleString()} ₸</span></div>
                    <div style="display:flex; justify-content:space-between; color:#e74c3c; font-size: 12px; margin-bottom: 4px;"><span>ВОЗВРАТЫ:</span><span>${totals.return.toLocaleString()} ₸</span></div>
                    <div style="display:flex; justify-content:space-between; color:#fff; font-weight:bold; font-size: 16px; margin-top:8px; border-top: 1px dashed #555; padding-top: 8px;"><span>В КАССЕ (ЗА ДАТУ):</span><span>${(totals.sale - totals.return).toLocaleString()} ₸</span></div>
                `;

            } catch (error) {
                repList.innerHTML = '<div style="text-align:center; color:#e74c3c; margin-top:30px; font-size: 12px;">ОШИБКА СВЯЗИ С СЕРВЕРОМ</div>';
            }

                const colors = { 'cash': '#27ae60', 'qr_kaspi': '#c0392b', 'installment': '#8e44ad', 'pos_terminal': '#2980b9', 'transfer': '#f39c12' };
                const names = { 'cash': 'Наличные', 'qr_kaspi': 'Kaspi QR', 'installment': 'Kaspi Red', 'pos_terminal': 'Карта', 'transfer': 'Перевод' };
                let totals = { sale: 0, return: 0 };
                
                // Отрисовываем полученные с сервера чеки
                repList.innerHTML = data.report.map(h => {
                    let isRet = h.type === 'return';
                    if (isRet) totals.return += h.total; else totals.sale += h.total;
                    
                    let itemsHtml = h.cart.map(c => 
                        `<div class="hb-item"><span>${c.name} (${c.qty} шт)</span><span>${(c.qty*c.price).toLocaleString()} ₸</span></div>`
                    ).join('');
                    
                    let blockColor = colors[h.methodCode] || '#2ecc71';
                    let methodName = names[h.methodCode] || h.methodCode;

                    return `
                    <div class="hist-block" style="border-left-color: ${blockColor};">
                        <div class="hb-head" style="color: ${blockColor};">
                            <span>${h.time} | ${isRet ? 'ВОЗВРАТ' : 'ПРОДАЖА'} | ${methodName}</span>
                            <span>${isRet ? '-' : ''}${h.total.toLocaleString()} ₸</span>
                        </div>
                        <div class="hb-items ${isRet ? 'hb-type-r' : ''}">${itemsHtml}</div>
                    </div>`;
                }).join('');
                
                totalsBox.innerHTML = `
                    <div style="display:flex; justify-content:space-between; color:#2ecc71; font-size: 12px; margin-bottom: 4px;"><span>ПРОДАЖИ:</span><span>${totals.sale.toLocaleString()} ₸</span></div>
                    <div style="display:flex; justify-content:space-between; color:#e74c3c; font-size: 12px; margin-bottom: 4px;"><span>ВОЗВРАТЫ:</span><span>${totals.return.toLocaleString()} ₸</span></div>
                    <div style="display:flex; justify-content:space-between; color:#fff; font-weight:bold; font-size: 16px; margin-top:8px; border-top: 1px dashed #555; padding-top: 8px;"><span>В КАССЕ (ЗА ДАТУ):</span><span>${(totals.sale - totals.return).toLocaleString()} ₸</span></div>
                `;

            } catch (error) {
                repList.innerHTML = '<div style="text-align:center; color:#e74c3c; margin-top:30px; font-size: 12px;">ОШИБКА СВЯЗИ С СЕРВЕРОМ</div>';
            }
        }

        function closeReport() { document.getElementById('report-modal').style.display = 'none'; }

        load();
    </script>
</body>
